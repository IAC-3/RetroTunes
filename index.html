<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroTunes</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ithaca&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Top Bar -->
    <div class="top-bar"></div>

    <!-- Playlist Bar -->
    <div class="playlist-bar">
      <div class="playlist-bar-content">
        <img class="playlist-cover" src="" alt="Playlist cover" />
        <div class="playlist-details">
          <div class="playlist-title">Select a playlist</div>
          <div class="playlist-description">Playlist description appears here</div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-content">
        <h2 class="sidebar-title">PATHS</h2>
        <div class="paths-container"></div>
        <button class="add-path-btn">+ add new path</button>

        <h2 class="sidebar-title">PLAYLIST</h2>
        <div class="playlists-container">
          <div class="playlist-item fixed-playlist" role="button" tabindex="0">
            <span>All songs</span>
          </div>
        </div>
        <button class="add-playlist-btn">+ create new playlist</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="app">
        <div class="song-table-placeholder">Select a playlist to show its songs</div>
      </div>
    </main>

    <div class="bottom-bar">
      <div class="bottom-bar-content">0 items, 0 minutes, 0 MB</div>
    </div>

    <div class="toast"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
