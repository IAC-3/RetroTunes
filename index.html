<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroTunes</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ithaca&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-inner">
        <div class="track-info-box">
          <div class="track-meta">
            <div class="track-title">No track selected</div>
            <div class="track-performer">No performer</div>
          </div>

          <div class="time-bar-row">
            <span class="time-label time-start">0:00</span>
            <div class="time-bar-track">
              <div class="time-bar-fill"></div>
              <div class="time-bar-thumb"></div>
            </div>
            <span class="time-label time-end">0:00</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sync-overlay hidden">
      <div class="spinner"></div>
      <div class="sync-overlay-text">Syncing...</div>
    </div>

    <!-- Playlist Bar -->
    <div class="playlist-bar">
      <div class="playlist-bar-content">
        <img class="playlist-cover" src="" alt="Playlist cover" />
        <div class="playlist-details">
          <div class="playlist-title">Select a playlist</div>
          <div class="playlist-description">Playlist description appears here</div>
        </div>
        <div class="playlist-actions-column">
          <button class="playlist-edit-button" disabled>EDIT</button>
          <button class="playlist-play-button">PLAY</button>
          <div class="playlist-search-wrapper">
            <div class="playlist-search-input-wrapper">
              <input class="playlist-search-input" type="text" placeholder="Search playlist" />
              <button class="playlist-search-button">SEARCH</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-content">
        <h2 class="sidebar-title">PATHS</h2>
        <div class="paths-container"></div>
        <button class="add-path-btn">+ add new path</button>

        <h2 class="sidebar-title">PLAYLIST</h2>
        <div class="playlists-container">
          <div class="playlist-item fixed-playlist" role="button" tabindex="0">
            <span>All songs</span>
          </div>
        </div>
        <button class="add-playlist-btn">+ create new playlist</button>
        <div class="sidebar-control-panel">
          <div class="control-panel-title">Control Panel</div>
          <div class="volume-panel">
            <span class="volume-label">VOL</span>
            <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.75" />
          </div>
          <div class="control-panel-controls">
            <button class="control-button shuffle-button" type="button" title="Shuffle">⇄</button>
            <button class="control-button prev-button" type="button" title="Previous track">⏮</button>
            <button class="control-button play-toggle-button" type="button" title="Play / Pause">▸</button>
            <button class="control-button next-button" type="button" title="Next track">⏭</button>
            <button class="control-button repeat-button" type="button" title="Repeat">⟲<span class="repeat-one-indicator hidden">1</span></button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="app">
        <div class="song-table-placeholder">Select a playlist to show its songs</div>
      </div>
    </main>

    <div class="bottom-bar">
      <div class="bottom-bar-content">0 items, 0 minutes, 0 MB</div>
      <div class="bottom-bar-actions">
        <button class="queue-toggle-button" type="button">Queue</button>
        <button class="show-missing-toggle-button" type="button">Show missing</button>
      </div>
      <div class="queue-popup hidden"></div>
    </div>

    <div class="toast"></div>

    <div class="playlist-modal hidden">
      <div class="playlist-modal-backdrop"></div>
      <div class="playlist-modal-content">
        <h2 class="playlist-modal-title">Create Playlist</h2>
        <div class="playlist-main-fields">
          <label>
            Name
            <input class="playlist-name-input" type="text" placeholder="Playlist name" />
          </label>
          <label>
            Description
            <textarea class="playlist-description-input" placeholder="Optional description"></textarea>
          </label>
          <label>
            Cover image
            <input class="playlist-cover-input" type="file" accept="image/*" />
          </label>
          <img class="playlist-cover-preview hidden" alt="Cover preview" />
          <button class="playlist-modal-add-songs-button" type="button">Add songs</button>
        </div>
        <div class="playlist-add-songs-section hidden">
          <h3 class="playlist-add-songs-title">Add songs to playlist</h3>
          <label>
            Title
            <input class="playlist-add-song-title" type="text" placeholder="Song title" />
          </label>
          <label>
            Composer
            <input class="playlist-add-song-composer" type="text" placeholder="Composer" />
          </label>
          <label>
            Album
            <input class="playlist-add-song-album" type="text" placeholder="Album" />
          </label>
          <div class="playlist-add-songs-controls">
            <button class="playlist-add-song-submit" type="button">Add song</button>
            <button class="playlist-add-songs-back" type="button">Back</button>
          </div>
          <div class="playlist-added-songs-count">0 songs added</div>
        </div>
        <div class="playlist-modal-actions">
          <button class="playlist-modal-save">Create</button>
          <button class="playlist-modal-delete hidden" type="button">Delete</button>
          <button class="playlist-modal-cancel" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div class="context-menu hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
